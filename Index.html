<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spelling Bee Ultimate 🐝</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(to bottom, #f0e68c, #ffb347);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
#container {
  background:white;
  border-radius:20px;
  padding:40px;
  width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  position:relative;
}
h1 {
  margin-bottom:20px;
  color:#ff8c00;
  text-shadow:2px 2px 5px rgba(0,0,0,0.2);
}
input {
  padding:12px;
  font-size:18px;
  width:100%;
  border-radius:8px;
  border:2px solid #ddd;
  outline:none;
  transition: all 0.2s ease;
}
input:focus {
  border-color:#ff8c00;
  box-shadow:0 0 10px rgba(255,140,0,0.3);
}
button {
  padding:12px 20px;
  margin-top:15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#ff8c00;
  color:white;
  cursor:pointer;
  transition: all 0.2s ease;
}
button:hover {
  background:#ffa500;
  transform:scale(1.05);
}
#result {
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
  min-height:24px;
  transition: all 0.3s ease;
}
#progressBarContainer {
  width:100%;
  background:#eee;
  border-radius:10px;
  margin-top:20px;
  height:15px;
}
#progressBar {
  height:15px;
  width:0%;
  background:#ff8c00;
  border-radius:10px;
  transition: width 0.3s ease;
}
#scoreboard {
  margin-top:15px;
  font-size:16px;
}
#definition {
  margin-top:10px;
  font-size:14px;
  color:#555;
  min-height:20px;
}
</style>
</head>
<body>

<div id="container">
<h1>Spelling Bee Ultimate 🐝</h1>

<button onclick="speakWord()">🔊 Pronounce Word</button> <br>

<input id="answer" type="text" placeholder="Type the spelling here">

<button onclick="checkSpelling()">Submit</button>

<div id="result"></div>
<div id="definition"></div>

<div id="progressBarContainer">
  <div id="progressBar"></div>
</div>

<div id="scoreboard"></div>
</div>
