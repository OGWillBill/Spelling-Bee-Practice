<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spelling Bee Practice</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 50px;
  background: #f4f6f8;
}
#container {
  background: white;
  padding: 30px;
  border-radius: 10px;
  display: inline-block;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
input {
  padding: 10px;
  font-size: 18px;
  width: 300px;
  margin-top: 15px;
}
button {
  padding: 10px 18px;
  font-size: 16px;
  margin: 10px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
  background: #4CAF50;
  color: white;
}
button:hover {
  background: #45a049;
}
#result {
  font-size: 20px;
  margin-top: 15px;
  font-weight: bold;
}
#score {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>Spelling Bee Practice 🐝</h1>

<div id="container">

<p>Listen to the word and type the spelling.</p>

<button onclick="speakWord()">🔊 Pronounce Word</button> <br>

<input id="answer" type="text" placeholder="Type the spelling here">
<br>

<button onclick="checkSpelling()">Submit</button>

<div id="result"></div>
<div id="score"></div>

</div>

<script>

let words = [
"Pseudopseudohypoparathyroidism",
"Psychoneuroendocrinological",
"Radiometeorograph",
"Hippopotomonstrosesquippedaliophobia",
"Floccinaucinihilipilification",
"Otorhinolaryngological",
"Quasquicentennial",
"Xylotypographic",
"Anthropomorphizing",
"Adrenocorticotrophin",
"Hypoparathyroidism",
"Neuropsychological",
"Psychophysicotherapeutics",
"Gastroenterologist",
"Pneumonoultramicroscopicsilicovolcanoconiosis"
];

// Shuffle words
words = words.sort(() => Math.random() - 0.5);

let currentIndex = 0;
let score = 0;

const answerBox = document.getElementById("answer");

answerBox.addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    checkSpelling();
  }
});

function speakWord() {
  const utterance = new SpeechSynthesisUtterance(words[currentIndex]);
  utterance.rate = 0.85;
  speechSynthesis.speak(utterance);
}

function checkSpelling() {

  const userAnswer = answerBox.value.trim();
  const correctWord = words[currentIndex];
  const result = document.getElementById("result");

  if (userAnswer.toLowerCase() === correctWord.toLowerCase()) {
    result.style.color = "green";
    result.textContent = "✅ Correct!";
    score++;
  } else {
    result.style.color = "red";
    result.textContent = "❌ Wrong! Correct spelling: " + correctWord;
  }

  currentIndex++;
  answerBox.value = "";

  document.getElementById("score").textContent =
    "Score: " + score + " / " + words.length;

  if (currentIndex >= words.length) {
    result.textContent += " 🎉 Practice complete!";
  }
}

document.getElementById("score").textContent =
"Score: 0 / " + words.length;

</script>

</body>
</html>
